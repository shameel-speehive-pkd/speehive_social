name: speehive_social
description: "Social media automation tool with AI-powered chat interface"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Environment
  flutter_dotenv: ^5.2.0

  # AI SDK (Vercel AI SDK Dart port)
  ai_sdk_dart: ^1.1.0
  ai_sdk_openai: ^1.1.0
  ai_sdk_provider: ^1.1.0
  ai_sdk_flutter_ui: ^1.1.0

  # State Management
  flutter_riverpod: ^2.6.0
  equatable: ^2.0.0

  # Secure Storage
  flutter_secure_storage: ^9.2.0

  # HTTP
  dio: ^5.7.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.5.0
  logger: ^2.5.0

  # UI
  flutter_markdown: ^0.7.0
  google_fonts: ^6.2.0
  shimmer: ^3.0.0
  animated_text_kit: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
